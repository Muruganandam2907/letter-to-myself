<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Letter to Myself</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0a1f44, #1e3c72);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: #0f2557;
    padding: 30px;
    border-radius: 15px;
    width: 400px;
    box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
}

h2 {
    color: gold;
    text-align: center;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 8px;
    border: none;
    outline: none;
}

textarea {
    height: 120px;
}

button {
    width: 100%;
    padding: 10px;
    background: gold;
    color: #0a1f44;
    font-weight: bold;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.hidden {
    display: none;
}

.panda {
    text-align: center;
}
</style>

</head>

<body>

<div class="container">

<!-- PAGE 1 -->
<div id="page1">
    <h2>Login</h2>
    <input type="text" placeholder="Enter your name" required>
    <input type="text" placeholder="Your portfolio / role" required>
    <input type="email" placeholder="Enter your email" required>
    <button onclick="nextPage()">Next</button>
</div>

<!-- PAGE 2 -->
<div id="page2" class="hidden">
    <h2>Letter to Myself</h2>

    <p><strong>Dear Future Me,</strong><br>
    (what kind of leader do I want to be?)</p>

    <textarea placeholder="Write your thoughts..."></textarea>

    <p>After my term, people should remember me as</p>
    <input type="text" placeholder="Your answer">

    <button onclick="submitForm()">Submit</button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="hidden panda">
    <h2>✨ Saved ✨</h2>
    <p>This letter is for you 🐼</p>
    <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" width="120">
</div>

</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbwWlOEfmUTxI2hLDjNF565GAwPBxU45a-q4Qk1ZNDF3tS_ODsrAta1bW4Ec_xIy8Cus/exec";

function nextPage() {
    document.getElementById("page1").classList.add("hidden");
    document.getElementById("page2").classList.remove("hidden");
}

function submitForm() {
    const inputs = document.querySelectorAll("input");

    const name = inputs[0].value;
    const portfolio = inputs[1].value;
    const email = inputs[2].value;
    const letter = document.querySelector("textarea").value;
    const remember = inputs[3].value;

    fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify({
            name,
            portfolio,
            email,
            letter,
            remember
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("page2").classList.add("hidden");
        document.getElementById("page3").classList.remove("hidden");
    })
    .catch(err => {
        alert("Error occurred");
        console.error(err);
    });
}
</script>

</body>
</html>
